<!-- Products Header -->
<div class="products-container container pt-main">
  <div class="products-layout flex">
    <!-- Sidebar Filters -->
    <aside class="products-sidebar">
      <div class="filter-group">
        <h3>Category</h3>
        <label class="custom-checkbox">
          <input type="checkbox" />
          <span>Apparel</span>
        </label>
        <label class="custom-checkbox">
          <input type="checkbox" />
          <span>Accessories</span>
        </label>
        <label class="custom-checkbox">
          <input type="checkbox" />
          <span>Living</span>
        </label>
      </div>

      <div class="filter-group">
        <h3>Price Range</h3>
        <input type="range" class="range-slider" min="0" max="1000" step="50" />
        <div class="range-labels flex justify-between">
          <span>$0</span>
          <span>$1000+</span>
        </div>
      </div>

      <div class="filter-group">
        <h3>Color</h3>
        <div class="color-swatches flex">
          <button
            class="swatch"
            style="background: #0f172a"
            title="Midnight"
          ></button>
          <button
            class="swatch"
            style="background: #e7e5e4"
            title="Sand"
          ></button>
          <button
            class="swatch"
            style="background: #775a19"
            title="Bronze"
          ></button>
          <button
            class="swatch"
            style="background: #064e3b"
            title="Forest"
          ></button>
          <button
            class="swatch"
            style="background: #fecdd3"
            title="Blush"
          ></button>
        </div>
      </div>
    </aside>

    <!-- Main Product Area -->
    <section class="products-main">
      <div class="products-topbar flex justify-between items-center">
        <p>Showing <strong>24</strong> architectural objects</p>

        <div class="sort-dropdown">
          <select class="custom-select">
            <option>Sort by: Newest</option>
            <option>Price: Low to High</option>
            <option>Price: High to Low</option>
            <option>Most Popular</option>
          </select>
          <span class="material-symbols-outlined">expand_more</span>
        </div>
      </div>

      <div class="products-grid">
        <!-- Card 1 -->
        <a href="#product-detail" onclick="route()" class="product-card">

            />
            <span class="badge">Limited</span>

            <div class="card-overlay">
              <button
                class="btn-primary flex items-center"
                style="gap: 0.5rem; justify-content: center"
              >
                <span class="material-symbols-outlined">shopping_cart</span>
                Quick Add
              </button>
            </div>
          </div>
          <div class="card-info">
            <div>
              <h3>The Sculptural Seat</h3>
              <p class="color-text">Brushed Ash & Canvas</p>
            </div>
            <div class="price">$850</div>

        <!-- Card 2 -->
        <a href="#product-detail" onclick="route()" class="product-card">

                <span class="material-symbols-outlined">shopping_cart</span>

          <div class="card-info">
            <div>
              <h3>Orb Vessel Set</h3>
              <p class="color-text">Matte Stoneware</p>
            </div>
            <div class="price">$320</div>
          </div>

        <a href="#product-detail" onclick="route()" class="product-card">
          <div class="card-img-wrapper">
            <img
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuDIECkyEBwAeu7-Nf2oqUPZtf-vWF7JzO2N5bnVXdnK-GJ3C4AcdSwNSX-AQ1RFayIZ4I9-410y7W71c5TPIqr6GFuXTGKw1NQRLnsIZwnYz1sUdfnK-jHQw0-3Ozj3L_ix9dk41TEeaUICgjLvu-5sArKKCdjYh5AmRFrvu3rygLq7C4wgOFSA3cWWBFHgLtHkif2e30-E5zFhJqYcSiFQAEskjxTOhCWsS4_8E-PwgZc6OVkMYaTis7BpMXeJ3CcHVP22Nm4_2on3"
            />

              <button
                class="btn-primary flex items-center"
                style="gap: 0.5rem; justify-content: center"
              >
                <span class="material-symbols-outlined">shopping_cart</span>
                Quick Add
              </button>
            </div>
          </div>
          <div class="card-info">
            <div>
              <h3>Faceted Decanter</h3>
              <p class="color-text">Mouth-blown Glass</p>
            </div>
            <div class="price">$145</div>
          </div>
        </a>
      </div>

      <!-- Pagination -->
      <div class="pagination flex">
        <button class="page-btn disabled">
          <span class="material-symbols-outlined">chevron_left</span>
        </button>
        <div class="page-numbers flex">
          <button class="page-num active">1</button>
          <button class="page-num">2</button>
          <button class="page-num">3</button>
          <span class="dots">...</span>
          <button class="page-num">12</button>
        </div>
        <button class="page-btn">
          <span class="material-symbols-outlined">chevron_right</span>
        </button>
      </div>
